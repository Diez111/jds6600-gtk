        fill="none" stroke="#3fb950" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Indicadores de canales -->
  <circle cx="18" cy="18" r="5" fill="#f0883e"/>
  <circle cx="18" cy="32" r="5" fill="#3fb950"/>
  
  <!-- Texto "JDS6600" -->
