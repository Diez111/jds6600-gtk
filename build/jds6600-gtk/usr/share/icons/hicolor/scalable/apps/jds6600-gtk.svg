        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Onda senoidal CH1 (naranja) -->
  <path d="M 10,64 C 25,20 40,20 55,64 C 70,108 85,108 100,64 C 115,20 125,20 130,64" 
