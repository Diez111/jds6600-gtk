<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Fondo con gradiente -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0883e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3fb950;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Fondo redondeado -->
  <rect x="4" y="4" width="120" height="120" rx="20" fill="url(#bgGrad)" stroke="#30363d" stroke-width="2"/>
  
  <!-- Grid de osciloscopio -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.5">
    <line x1="20" y1="30" x2="108" y2="30"/>
    <line x1="20" y1="50" x2="108" y2="50"/>
    <line x1="20" y1="70" x2="108" y2="70"/>
    <line x1="20" y1="90" x2="108" y2="90"/>
    <line x1="35" y1="20" x2="35" y2="100"/>
    <line x1="50" y1="20" x2="50" y2="100"/>
    <line x1="65" y1="20" x2="65" y2="100"/>
    <line x1="80" y1="20" x2="80" y2="100"/>
    <line x1="95" y1="20" x2="95" y2="100"/>
  </g>
  
  <!-- Ejes centrales -->
  <line x1="20" y1="60" x2="108" y2="60" stroke="#484f58" stroke-width="1"/>
  <line x1="64" y1="20" x2="64" y2="100" stroke="#484f58" stroke-width="1"/>
  
  <!-- Onda senoidal CH1 (naranja) -->
  <path d="M 20,60 Q 30,30 40,60 Q 50,90 60,60 Q 70,30 80,60 Q 90,90 100,60" 
        fill="none" stroke="#f0883e" stroke-width="3" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Onda senoidal CH2 (verde) - más pequeña -->
  <path d="M 20,60 Q 25,45 30,60 Q 35,75 40,60 Q 45,45 50,60 Q 55,75 60,60 Q 65,45 70,60 Q 75,75 80,60 Q 85,45 90,60 Q 95,75 100,60" 
        fill="none" stroke="#3fb950" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Indicadores de canales -->
  <circle cx="25" cy="25" r="4" fill="#f0883e"/>
  <circle cx="25" cy="35" r="4" fill="#3fb950"/>
  
  <!-- Texto "JDS" -->
  <text x="64" y="110" font-family="monospace" font-size="14" font-weight="bold" fill="#58a6ff" text-anchor="middle">JDS6600</text>
</svg>
